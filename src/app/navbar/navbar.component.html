<nav
  class="backdrop-blur-md bg-white/10 border-b border-white/20 fixed w-full top-0 z-50 shadow-lg"
>
  <div class="max-w-6x2 mx-auto px-6 py-4 flex items-center justify-between">
    <!-- Logo -->
    <a routerLink="/" class="text-xl font-bold text-white tracking-wide">
      Arnaud Claire
      <span class="text-blue-400">/ Fullstack</span>
    </a>

    <!-- Burger (mobile) -->
    <button
      (click)="isOpen = !isOpen"
      class="lg:hidden text-white text-3xl focus:outline-none"
    >
      ☰
    </button>

    <!-- Menu desktop -->
    <div class="hidden lg:flex space-x-10 text-white text-lg font-medium">
      <a
        routerLink="/"
        routerLinkActive="text-blue-400 underline underline-offset-4"
        [routerLinkActiveOptions]="{ exact: true }"
        class="hover:text-blue-300 transition"
      >
        Accueil
      </a>

      <a
        routerLink="/about"
        routerLinkActive="text-blue-400 underline underline-offset-4"
        class="hover:text-blue-300 transition"
      >
        A propos
      </a>

      <div class="relative group">
        <a
          routerLink="/comp"
          class="hover:text-blue-300 transition cursor-pointer"
        >
          Compétences
        </a>

        <!-- Sous-menu -->
        <div
          class="absolute left-0 mt-3 w-64 bg-gray-900 border border-white/10 rounded-lg shadow-lg opacity-0 group-hover:opacity-100 invisible group-hover:visible transition-all duration-200 z-50"
        >
          <a
            *ngFor="let skill of skills"
            [routerLink]="['/comp', skill.slug]"
            class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-800 hover:text-white"
          >
            {{ skill.icon }} {{ skill.name }}
          </a>
        </div>
      </div>

      <a
        routerLink="/real"
        routerLinkActive="text-blue-400 underline underline-offset-4"
        class="hover:text-blue-300 transition"
      >
        Réalisations
      </a>
    </div>
  </div>

  <!-- Menu mobile -->
  <div
    *ngIf="isOpen"
    class="lg:hidden bg-black/70 backdrop-blur-md text-white text-center pb-4 space-y-4"
  >
    <a
      routerLink="/"
      routerLinkActive="text-blue-400"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="isOpen = false"
      class="block py-2 text-lg font-medium"
    >
      Accueil
    </a>

    <a
      routerLink="/formation"
      routerLinkActive="text-blue-400"
      (click)="isOpen = false"
      class="block py-2 text-lg font-medium"
    >
      Formations
    </a>

    <a
      routerLink="/real"
      routerLinkActive="text-blue-400"
      class="block py-2 text-lg font-medium"
    >
      Réalisations
    </a>

    <div class="border-t border-white/10 pt-2">
      <a
        [routerLink]="['/comp']"
        (click)="isOpen = false"
        class="block py-2 text-lg font-medium"
      >
        Compétences
      </a>
      <a
        *ngFor="let skill of skills"
        [routerLink]="['/comp', skill.slug]"
        (click)="isOpen = false"
        class="block py-1 text-sm hover:text-blue-300"
      >
        {{ skill.icon }} {{ skill.name }}
      </a>
    </div>
  </div>
</nav>
