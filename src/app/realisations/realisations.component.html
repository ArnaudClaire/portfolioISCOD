<div class="min-h-screen bg-gray-900 text-white py-20 px-6">
  <div class="max-w-5xl mx-auto">
    <h1 class="text-4xl font-bold mb-10 text-center">Mes réalisations</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <a
        *ngFor="let real of realisations"
        [routerLink]="['/real', real.slug]"
        class="block bg-gray-800 p-6 rounded-lg hover:bg-gray-700 transition"
      >
        <h2 class="text-xl font-semibold mb-2">
          {{ real.title }}
        </h2>

        <p class="text-gray-300 text-sm">
          {{ real.shortDescription }}
        </p>
      </a>
    </div>
  </div>
</div>
