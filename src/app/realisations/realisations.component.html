<section class="realisations-page">
  <div class="realisations-shell">
    <header class="realisations-header">
      <p class="eyebrow">Realisations</p>
      <h1>Mes realisations</h1>
    </header>

    <div class="realisations-grid">
      <a
        *ngFor="let real of realisations"
        [routerLink]="['/real', real.slug]"
        class="real-card"
        [ngStyle]="getToneStyle(real.slug)"
      >
        <p class="real-eyebrow">Projet</p>
        <h2>{{ real.title }}</h2>

        <p class="real-description">
          {{ real.shortDescription }}
        </p>

        <span class="real-cta">Voir la realisation</span>
      </a>
    </div>
  </div>
</section>
