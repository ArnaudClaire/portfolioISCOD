<div
  *ngIf="modalService.isOpen$ | async"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4 sm:p-6"
>
  <div
    class="relative max-h-[calc(100svh-2rem)] w-full max-w-2xl overflow-y-auto rounded-[2rem] border border-white/10 bg-gray-900 p-5 sm:max-h-[calc(100svh-3rem)] sm:p-8"
  >
    <button
      class="absolute right-4 top-4 text-2xl text-gray-400 hover:text-white"
      (click)="close()"
      aria-label="Fermer la fenetre de contact"
    >
      x
    </button>

    <div
      class="mb-6 flex flex-col items-center gap-6 text-center md:flex-row md:items-center md:text-left"
    >
      <div
        class="w-32 overflow-hidden rounded-[1.75rem] border border-white/10 bg-white/5 p-2 shadow-xl shadow-cyan-950/30"
      >
        <img
          [src]="profilePhotoUrl"
          alt="Photo d'Arnaud Claire"
          width="1378"
          height="1496"
          class="block aspect-[4/5] w-full rounded-[1.25rem] bg-slate-950/70 object-cover object-center"
        />
      </div>

      <div class="text-center md:text-left">
        <h2 class="mb-2 text-2xl font-bold text-white">Me contacter</h2>
        <p class="text-gray-400">
          Vous pouvez m'ecrire directement par email ou me retrouver sur LinkedIn.
        </p>
      </div>
    </div>

    <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
      <a
        [href]="'mailto:' + emailAddress"
        class="rounded-2xl border border-blue-400/20 bg-blue-500/10 p-4 text-left transition hover:bg-blue-500/15"
      >
        <p class="mb-2 text-sm uppercase tracking-[0.2em] text-blue-300">
          Email
        </p>
        <p class="break-all font-semibold text-white">{{ emailAddress }}</p>
      </a>

      <a
        [href]="linkedinUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="rounded-2xl border border-cyan-400/20 bg-cyan-500/10 p-4 text-left transition hover:bg-cyan-500/15"
      >
        <p class="mb-2 text-sm uppercase tracking-[0.2em] text-cyan-300">
          LinkedIn
        </p>
        <p class="font-semibold text-white">Voir mon profil</p>
      </a>

      <a
        [href]="githubUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="rounded-2xl border border-slate-300/20 bg-slate-500/10 p-4 text-left transition hover:bg-slate-500/15"
      >
        <p class="mb-2 text-sm uppercase tracking-[0.2em] text-slate-300">
          GitHub
        </p>
        <p class="font-semibold text-white">Voir mon profil</p>
      </a>
    </div>
  </div>
</div>
