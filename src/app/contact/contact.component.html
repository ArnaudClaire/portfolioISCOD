<div
  *ngIf="modalService.isOpen$ | async"
  class="fixed inset-0 bg-black/70 z-50 flex items-center justify-center"
>
  <div class="bg-gray-900 p-8 rounded-lg w-full max-w-lg relative">
    <button
      class="absolute top-4 right-4 text-gray-400 hover:text-white"
      (click)="close()"
    >
      ✕
    </button>

    <h2 class="text-2xl font-bold mb-6 text-white">Me contacter</h2>

    <form [formGroup]="contactForm" (ngSubmit)="submit()" class="space-y-4">
      <input
        formControlName="name"
        placeholder="Nom"
        class="w-full p-2 bg-gray-800 rounded text-white"
      />

      <input
        formControlName="email"
        placeholder="Email"
        class="w-full p-2 bg-gray-800 rounded text-white"
      />

      <textarea
        formControlName="message"
        rows="4"
        placeholder="Message"
        class="w-full p-2 bg-gray-800 rounded text-white"
      ></textarea>

      <button
        type="submit"
        class="w-full bg-blue-500 hover:bg-blue-600 py-2 rounded"
        [disabled]="loading"
      >
        {{ loading ? "Envoi..." : "Envoyer" }}
      </button>

      <p *ngIf="success" class="text-green-400 text-sm mt-3">
        Message envoyé avec succès ✅
      </p>

      <p *ngIf="error" class="text-red-400 text-sm mt-3">
        Une erreur est survenue. Réessaie plus tard.
      </p>
    </form>
  </div>
</div>
